name: test docker
on: [push]
jobs:
  test-sigstore:
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    env:
      REGISTRY: "ghcr.io"
      IMAGE_NAME: "${{ github.repository }}"
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable("IMAGE_NAME", process.env.IMAGE_NAME.toLowerCase().replaceAll("_", "-"));
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        id: build-push-action
        with:
          push: true
          tags: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          labels: "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}"
          provenance: false
          sbom: false
        env:
          DOCKER_BUILD_SUMMARY: false
      - uses: actions/attest-build-provenance@v3
        with:
          subject-name: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-push-action.outputs.digest }}"
          subject-digest: ${{ steps.build-push-action.outputs.digest }}
